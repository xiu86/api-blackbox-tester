interface:
  display_name: "测试用例评审"
  short_description: "多角色按变更影响接口、业务场景、断言和证据评审测试用例"
  default_prompt: "使用 $api-blackbox-test-reviewer 评审 planner 输出的结构化路由影响分析、变更代码影响接口清单、风险驱动用例生成矩阵、业务场景拆解、断言计划、证据采集计划、场景 x 边界/异常覆盖矩阵、测试用例、接口 x 字段语义等价类矩阵和跨接口一致性用例；资深软件工程师必须优先基于当前项目可用的结构化路由分析工具结果核对变更文件/符号到直接影响接口、间接受影响接口、逻辑类似接口和编排链路的映射，没有可用工具时再基于代码 diff、路由表、调用链、API 文档、代码搜索和项目约定兜底；测试证据审计员必须核对核心用例证据包、DB/副作用证据和报告可追溯性；关联接口未纳入测试范围且无豁免依据、核心业务场景只有 Happy Path、核心用例缺少断言或证据要求时不得通过，保存到 tests/【需求】_YYYYMMDD/测试用例评审.md；通过后再进入 executor，不通过则退回 planner 完善。"
policy:
  allow_implicit_invocation: true
