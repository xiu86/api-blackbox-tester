interface:
  display_name: "接口测试方案规划"
  short_description: "编码前输出业务场景、影响初判和字段语义矩阵"
  default_prompt: "使用 $api-blackbox-test-planner 先基于需求分析和技术方案输出测试范围、直接影响和潜在扩散影响，拆分所有业务场景；每个核心场景不能只测 Happy Path，必须覆盖适用边界值、异常路径、权限/状态/数据变体和跨接口失败链路；再输出业务场景拆解、场景 x 边界/异常覆盖矩阵、接口 x 字段语义等价类矩阵、跨接口一致性用例、测试用例、数据计划和编排链路，并保存到 tests/【需求】_YYYYMMDD/测试方案.md。"
policy:
  allow_implicit_invocation: true
