interface:
  display_name: "接口测试方案规划"
  short_description: "编码前输出变更影响接口、业务场景和字段语义矩阵"
  default_prompt: "使用 $api-blackbox-test-planner 先基于需求分析、技术方案和本次代码变更输出变更代码影响接口清单，把变更文件/符号映射到直接影响接口、间接受影响接口、逻辑类似接口、调用方/消费者/任务和编排链路；所有关联接口必须纳入测试范围、矩阵、跨接口一致性用例或编排链路，未纳入时写明豁免依据；再输出测试范围、影响范围初判、风险驱动用例生成矩阵、业务场景拆解、断言计划、证据采集计划、测试数据覆盖矩阵、场景 x 边界/异常覆盖矩阵、接口 x 字段语义等价类矩阵、跨接口一致性用例、测试用例、数据计划和编排链路，并保存到 tests/【需求】_YYYYMMDD/测试方案.md。"
policy:
  allow_implicit_invocation: true
