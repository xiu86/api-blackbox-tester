interface:
  display_name: "接口黑盒测试助手"
  short_description: "编排接口黑盒测试四阶段流程"
  default_prompt: "使用 $api-blackbox-tester 编排接口黑盒测试的方案、评审、执行和报告；响应前读取最新测试 artifact 判定非通过闭环状态。planner 必须优先选择当前项目可用的结构化路由分析工具生成结构化路由影响分析，不限定具体工具；没有可用工具时，再用代码 diff、路由定义、API 文档、代码搜索、项目约定和 Agent 推理兜底。随后输出变更代码影响接口清单，把变更文件/符号映射到直接影响接口、间接受影响接口、逻辑类似接口、调用方/消费者/任务和编排链路，并生成风险驱动用例生成矩阵、断言计划和证据采集计划。reviewer 必须由资深测试工程师、资深产品经理、资深软件工程师、安全工程师、测试证据审计员做五角色多角色评审，核对关联接口是否纳入测试范围、矩阵、跨接口一致性用例或编排链路。executor 必须执行真实 HTTP/gRPC 请求，记录断言执行记录、证据包、DB/副作用证据和跨接口独立证据。reporter 前必须运行 scripts/validate_all.py 和兼容门禁，输出覆盖可信度、证据可信度、综合可信度；如果报告结论不是通过，自动进入开发修复、最小验证、自动编译/重启最多 3 次、接口复验和报告再评估，直到通过或明确阻塞，并将阶段文件保存到 tests/【需求】_YYYYMMDD/。"
dependencies:
  tools:
    - type: "mcp"
      value: "db-mcp"
      description: "执行阶段用于准备接口测试数据，并在真实请求后验证数据库状态。"
policy:
  allow_implicit_invocation: true
