interface:
  display_name: "接口黑盒测试助手"
  short_description: "编排接口黑盒测试四阶段流程"
  default_prompt: "使用 $api-blackbox-tester 编排接口黑盒测试的方案、评审、执行和报告；响应前读取最新测试 artifact 判定闭环状态，评审阶段必须先基于需求分析和技术方案判断测试范围，再追踪公共方法、共享组件、关联接口等扩散影响并做结构化对抗性辩论；执行前必须核对直接影响和扩散影响覆盖；如果报告结论不是通过，自动进入开发修复、最小验证、自动编译/重启最多 3 次、接口复验和报告再评估，直到通过或明确阻塞，并将阶段文件保存到 tests/【需求】_YYYYMMDD/。"
dependencies:
  tools:
    - type: "mcp"
      value: "db-mcp"
      description: "执行阶段用于准备接口测试数据，并在真实请求后验证数据库状态。"
policy:
  allow_implicit_invocation: true
