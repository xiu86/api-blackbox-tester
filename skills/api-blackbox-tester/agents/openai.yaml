interface:
  display_name: "接口黑盒测试助手"
  short_description: "编排接口黑盒测试四阶段流程"
  default_prompt: "使用 $api-blackbox-tester 编排接口黑盒测试的方案、评审、执行和报告；响应前读取最新测试 artifact 判定闭环状态，planner 必须基于需求分析和技术方案拆分所有业务场景，每个核心场景不能只测 Happy Path，必须覆盖适用边界值、异常路径、权限/状态/数据变体和跨接口失败链路；评审阶段必须追踪公共方法、共享组件、关联接口等扩散影响并做结构化对抗性辩论；执行前必须核对直接影响、扩散影响、业务场景和矩阵覆盖；报告前运行自动门禁脚本并输出测试结果可信度评分；如果报告结论不是通过，自动进入开发修复、最小验证、自动编译/重启最多 3 次、接口复验和报告再评估，直到通过或明确阻塞，并将阶段文件保存到 tests/【需求】_YYYYMMDD/。"
dependencies:
  tools:
    - type: "mcp"
      value: "db-mcp"
      description: "执行阶段用于准备接口测试数据，并在真实请求后验证数据库状态。"
policy:
  allow_implicit_invocation: true
