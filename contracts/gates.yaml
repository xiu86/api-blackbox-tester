pass_gate:
  min_score: 85
  reject_if:
    - "未通过用例数 > 0"
    - "跳过用例数 > 0"
    - "阻塞用例数 > 0"
    - "未执行用例数 > 0"
    - "必测矩阵单元未执行"
    - "必测场景覆盖单元未执行"
    - "核心证据包缺失"
    - "写接口缺少 DB/副作用证据"
    - "跨接口一致性只执行单侧接口"
    - "兼容性无旧行为证据却判定通过"
    - "多角色评审阻塞项未解决"

lifecycle_gate:
  non_pass_required_sections:
    - "失败项"
    - "开发修复与复验计划"
    - "阻塞解除计划"
    - "闭环执行状态"
