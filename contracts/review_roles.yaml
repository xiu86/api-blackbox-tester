roles:
  "资深测试工程师":
    required_focus:
      - "业务场景拆解"
      - "边界/异常覆盖"
      - "矩阵单元用例和断言"
      - "Happy Path 偏置"
  "资深产品经理":
    required_focus:
      - "需求覆盖"
      - "用户流程"
      - "字段语义"
      - "历史兼容"
  "资深软件工程师":
    required_focus:
      - "变更代码影响接口清单"
      - "接口契约"
      - "DB/副作用"
      - "幂等/并发"
  "安全工程师":
    required_focus:
      - "鉴权"
      - "权限/IDOR"
      - "租户隔离"
      - "注入/敏感信息"
  "测试证据审计员":
    required_focus:
      - "证据包"
      - "断言证据"
      - "DB/副作用证据"
      - "阻塞补救证据"

reject_if:
  - "任一角色存在未解决阻塞项"
  - "资深软件工程师未完成变更影响接口评估"
  - "安全工程师未完成受保护接口安全评估"
  - "测试证据审计员指出核心用例缺少证据路径或 DB 断言"
